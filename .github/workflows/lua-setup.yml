name: Setup Lua and Test

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Install Lua
        run: |
          sudo apt-get update
          sudo apt-get install -y lua5.3 lua5.3-dev
      
      - name: Verify Lua Installation
        run: |
          lua -v
          luac -v
      
      - name: Run Lua Script (Example)
        run: |
          echo "✅ Lua and Luac are ready to use!"
